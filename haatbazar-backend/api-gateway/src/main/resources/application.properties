spring.application.name=api-gateway

server.port=8080

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# ---- Auth Service Route ----
spring.cloud.gateway.mvc.routes[0].id=auth-service
spring.cloud.gateway.mvc.routes[0].uri=lb://AUTH-SERVICE
spring.cloud.gateway.mvc.routes[0].predicates[0]=Path=/api/auth/**

# ---- Product Service Route ----
spring.cloud.gateway.mvc.routes[1].id=product-service
spring.cloud.gateway.mvc.routes[1].uri=lb://PRODUCT-SERVICE
spring.cloud.gateway.mvc.routes[1].predicates[0]=Path=/api/products/**,/api/categories/**,/api/inventory/**

# ---- Order Service Route ----
spring.cloud.gateway.mvc.routes[2].id=order-service
spring.cloud.gateway.mvc.routes[2].uri=lb://ORDER-SERVICE
spring.cloud.gateway.mvc.routes[2].predicates[0]=Path=/api/orders/**,/api/cart/**

# ---- Payment Service Route ----
spring.cloud.gateway.mvc.routes[3].id=payment-service
spring.cloud.gateway.mvc.routes[3].uri=lb://PAYMENT-SERVICE
spring.cloud.gateway.mvc.routes[3].predicates[0]=Path=/api/payments/**